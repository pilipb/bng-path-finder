<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a7a3c"/>
      <stop offset="100%" stop-color="#0f5229"/>
    </radialGradient>
    <radialGradient id="leaf" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- Leaf shape -->
  <path d="M32 10 C18 14 10 26 14 42 C20 38 28 34 32 30 C36 34 44 38 50 42 C54 26 46 14 32 10 Z"
        fill="url(#leaf)" opacity="0.95"/>

  <!-- Leaf midrib -->
  <path d="M32 10 L32 44" stroke="#15803d" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Left veins -->
  <path d="M32 20 L22 28 M32 28 L19 34 M32 36 L22 40"
        stroke="#15803d" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Right veins -->
  <path d="M32 20 L42 28 M32 28 L45 34 M32 36 L42 40"
        stroke="#15803d" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Dashed route path overlaid on leaf (bottom portion) -->
  <path d="M16 50 Q24 44 32 48 Q40 52 50 46"
        stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="3.5 2.5" fill="none"/>

  <!-- Route waypoint dots -->
  <circle cx="16" cy="50" r="2.8" fill="#fbbf24"/>
  <circle cx="50" cy="46" r="2.8" fill="#fbbf24"/>
  <circle cx="32" cy="48.5" r="2" fill="#fef08a"/>
</svg>
